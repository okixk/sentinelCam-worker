# Optional Linux webcam passthrough override for docker-compose.worker.yml.
# Use together with the base worker compose file:
#   docker compose -f docker-compose.worker.yml -f docker-compose.worker-cam.yml up -d --build
#
# Set WORKER_VIDEO_DEVICE to the camera device path (default: /dev/video0).

services:
  worker:
    devices:
      - "${WORKER_VIDEO_DEVICE:-/dev/video0}:${WORKER_VIDEO_DEVICE:-/dev/video0}"
    group_add:
      - video
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "--source"
      - "${WORKER_SOURCE:-0}"
      - "--no-window"
      - "--stream"
      - "auto"
