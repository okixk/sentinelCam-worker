#
# Optional Linux host-network override for loopback-only workers.
# Use together with the base worker compose file:
#   docker compose -f docker-compose.worker.yml -f docker-compose.linux.yml up -d --build
#
# This keeps the worker on 127.0.0.1 by default, which is useful when pairing
# it with the legacy sentinelCam-web docker-compose.linux.yml override that also
# runs on the host network and proxies to http://127.0.0.1:8080.
#
services:
  worker:
    network_mode: host
    ports: !reset []
    command:
      - "--host"
      - "127.0.0.1"
      - "--port"
      - "8080"
      - "--source"
      - "${WORKER_SOURCE:-testsrc}"
      - "--no-window"
      - "--stream"
      - "auto"
