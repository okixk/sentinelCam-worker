# Shared launcher settings for run.sh and run.bat
# Simple KEY=VALUE format so both scripts can read the same file.

RUNTIME_DIR=.runtime
VENV_SUBDIR=venv
ULTRA_CFG_SUBDIR=ultralytics_config
WEIGHTS_SUBDIR=weights
RUNS_SUBDIR=runs
DATASETS_SUBDIR=datasets
PIP_CACHE_SUBDIR=pip-cache

# Default sources can differ per OS, but they live in this one shared file, like that rtsp://11.111.1.111:8554
DEFAULT_SOURCE_LINUX=0
DEFAULT_SOURCE_WINDOWS=0

# Shared webcam.py defaults
DEFAULT_DEVICE=auto
DEFAULT_USE_POSE=1
DEFAULT_MAX_FPS=120

# Shared vcam defaults (used by run.sh)
VCAM_DEFAULT_INPUT=testsrc
VCAM_DEFAULT_NR=42
VCAM_DEFAULT_SIZE=1280x720
VCAM_DEFAULT_FPS=30

# Hardware-aware model/preset defaults (used by run.bat / run.sh interactive preset selection)
DEFAULT_PRESET_CPU=yolov8n
DEFAULT_PRESET_ACCEL=yolo26x

# Default web streaming settings
# Stream quality preset: low|medium|high|ultra|auto (default: high)
#DEFAULT_STREAM_QUALITY=high
# JPEG quality for MJPEG fallback (10-95, default: 80)
#DEFAULT_JPEG_QUALITY=80
