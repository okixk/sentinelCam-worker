# Shared launcher settings for run.sh and run.bat
# Simple KEY=VALUE format so both scripts can read the same file.

RUNTIME_DIR=.runtime
VENV_SUBDIR=venv
ULTRA_CFG_SUBDIR=ultralytics_config
WEIGHTS_SUBDIR=weights
RUNS_SUBDIR=runs
DATASETS_SUBDIR=datasets
PIP_CACHE_SUBDIR=pip-cache

# Default sources can differ per OS, but they live in this one shared file, like that rtsp://11.111.1.111:8554
DEFAULT_SOURCE_LINUX=0
DEFAULT_SOURCE_WINDOWS=0

# Shared webcam.py defaults
DEFAULT_DEVICE=auto
DEFAULT_USE_POSE=1
DEFAULT_MAX_FPS=120
DEFAULT_WEB_HOST=127.0.0.1

# Shared vcam defaults (used by run.sh)
VCAM_DEFAULT_INPUT=testsrc
VCAM_DEFAULT_NR=42
VCAM_DEFAULT_SIZE=1920x1080
VCAM_DEFAULT_FPS=60

# Hardware-aware model/preset defaults (used by run.bat / run.sh interactive preset selection)
DEFAULT_PRESET_CPU=yolov8n
DEFAULT_PRESET_ACCEL=yolo26x

# Default web streaming settings
# Bind host for the worker web stream. Use 0.0.0.0 to expose it on the LAN.
# Optional bearer token for stream + API protection.
#WEB_AUTH_TOKEN=replace-with-a-long-random-secret
# Optional comma-separated CORS allowlist for trusted browser origins.
# Example: WEB_ALLOWED_ORIGINS=http://127.0.0.1:3000,http://localhost:3000
#WEB_ALLOWED_ORIGINS=
# Max accepted size of POST /api/cmd in bytes.
#WEB_MAX_CMD_BYTES=8192
# Preferred worker stream mode: auto|webrtc|mjpeg
DEFAULT_STREAM_MODE=auto
# Target WebRTC video bitrate in kbps (0 = aiortc default bitrate control)
DEFAULT_WEBRTC_BITRATE_KBPS=2500
# WebRTC ICE UDP port range (restrict media transport to these ports)
DEFAULT_WEBRTC_PORT_MIN=50000
DEFAULT_WEBRTC_PORT_MAX=51000
# Use GPU H.264 encoder if available (1=auto-detect, 0=force CPU)
DEFAULT_WEBRTC_GPU=1
# Frame sharing: encode once, share to all clients (1=on, 0=off)
DEFAULT_WEBRTC_FRAME_SHARING=1
# Stream quality preset: low|medium|high|ultra|auto
DEFAULT_STREAM_QUALITY=high
# JPEG quality for MJPEG fallback (10-95)
DEFAULT_JPEG_QUALITY=88
